<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form | Registartion Form</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <form action="#">
      <center><h1>General Admission Registration</h1></center>
      <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="First Name" />
        <label for="lastname"></label>
        <input type="text" id="lastname" placeholder="Last Name" /> <br /><br />

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="example@example.com"
        /><br /><br />

        <label>Gender</label>
        <input type="radio" id="Male" name="gender" value="male" />
        <label for="Male"> Male</label>
        <input type="radio" id="Female" name="gender" value="female" />
        <label for="Female"> Female</label> <br /><br />

        <label for="telephone">Phone</label>
        <input type="tel" id="telephone" /> <br /><br />

        <label for="emergency"> Emergency Contact</label>
        <input type="tel" id="emergency" /><br /><br />
      </fieldset>

      <fieldset>
        <legend>Additional Information</legend>
        <label> Do you require Parking? </label>
        <input type="radio" id="Yes" name="parking" value="Yes" />
        <label for="Yes"> Yes </label>
        <input type="radio" id="No" name="parking" value="No" />
        <label for="No"> NO </label><br /><br />

        <label> What is your room preference? </label>
        <input type="radio" id="Single_Room" name="room" value="Single_Room" />
        <label for="Single_Room"> Single Room </label>
        <input
          type="radio"
          id="Shared_Room"
          name="room"
          value="Shared_Room"
        /><label for="Shared_Room">Shared Room</label>
        <input type="radio" id="No_Room" name="room" value="No_Room" />

        <label for="No_Room">No Room Needed</label><br /><br />
        <textarea
          name="JD"
          id="JD"
          rows="10"
          cols="50"
          placeholder="Enter your feedback here!"
        ></textarea>
      </fieldset>
      <button type="submit">Submit</button>
    </form>

    <button aria-label="Search">🔍</button>
  </body>
</html>
